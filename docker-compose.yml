services:
  thesi-api:
    container_name: thesi-api-local
    build:
      context: ./thesi-api
      dockerfile: Dockerfile
      target: development
    ports:
      - "5010:5000"
    env_file:
      - ./thesi-api/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: thesi
      POSTGRES_SSL_ENABLED: "false"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/thesi
      PORT: 5000
      NODE_ENV: development
    volumes:
      - ./thesi-api:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - thesi_network
    restart: unless-stopped

  thesi-web:
    container_name: thesi-web-local
    build:
      context: ./thesi-web
      dockerfile: Dockerfile
      target: development
    ports:
      - "3010:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5010
      THESI_API_URL: http://thesi-api:5000
      NODE_ENV: development
    volumes:
      - ./thesi-web:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/.next
    depends_on:
      - thesi-api
    networks:
      - thesi_network
    restart: unless-stopped

  postgres:
    container_name: thesi-postgres-local
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: thesi
    volumes:
      - thesi_postgres_data:/var/lib/postgresql/data
    networks:
      - thesi_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d thesi"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  thesi_network:
    driver: bridge

volumes:
  thesi_postgres_data:
