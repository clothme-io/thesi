services:
  thesi-api:
    container_name: thesi-api-local
    build:
      context: ./thesi-api
      dockerfile: Dockerfile
      target: development
    ports:
      - "5010:5000"
    env_file:
      - ./thesi-api/.env
    environment:
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: 5434
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: thesi
      POSTGRES_SSL_ENABLED: "false"
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:5434/thesi
      PORT: 5000
      NODE_ENV: development
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./thesi-api:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - thesi_network
    restart: unless-stopped

  thesi-web:
    container_name: thesi-web-local
    build:
      context: ./thesi-web
      dockerfile: Dockerfile
      target: development
    ports:
      - "3010:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5010
      THESI_API_URL: http://thesi-api:5000
      NODE_ENV: development
    volumes:
      - ./thesi-web:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/.next
    depends_on:
      - thesi-api
    networks:
      - thesi_network
    restart: unless-stopped

networks:
  thesi_network:
    driver: bridge
